<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table using Prompt</title>
</head>

<body>

<h2>Multiplication Table Generator</h2>

<button onclick="showTable()">Enter Number</button>

<p id="result"></p>

<script>
function showTable() {
    // PROMPT BOX
    var num = prompt("Enter a number:");

    if (num == null || num == "") {
        alert("Please enter a valid number!");
        return;
    }

    var output = "";

    for (var i = 1; i <= 10; i++) {
        output += num + " x " + i + " = " + (num * i) + "<br>";
    }

    // DISPLAY RESULT
    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
