<!DOCTYPE html>
<html>
<head>
    <title>Factorial & Floor Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h2>Factorial Calculator</h2>
<input type="number" id="factInput" placeholder="Enter number">
<button id="factBtn">Calculate Factorial</button>
<p id="factResult"></p>

<hr>

<h2>Floor Value Calculator</h2>
<input type="number" step="any" id="floorInput" placeholder="Enter decimal number">
<button id="floorBtn">Find Floor</button>
<p id="floorResult"></p>

<script>
$(document).ready(function(){

    
    $("#factBtn").click(function(){
        let num = parseInt($("#factInput").val());
        let fact = 1;

        if(num < 0){
            $("#factResult").text("Factorial not defined for negative numbers");
            return;
        }

        for(let i = 1; i <= num; i++){
            fact *= i;
        }

        $("#factResult").text("Factorial = " + fact);
    });

    
    $("#floorBtn").click(function(){
        let num = parseFloat($("#floorInput").val());
        let floorValue = Math.floor(num);

        $("#floorResult").text("Floor value = " + floorValue);
    });

});
</script>

</body>
</html>
